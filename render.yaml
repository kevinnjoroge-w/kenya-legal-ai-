services:
  # Backend API Service
  - type: web
    name: kenya-legal-ai
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      # All other keys (GROQ_API_KEY, MISTRAL_API_KEY, QDRANT_HOST,
      # QDRANT_PORT, QDRANT_API_KEY, QDRANT_COLLECTION, EMBEDDING_PROVIDER,
      # LLM_PROVIDER, LLM_MODEL, SECRET_KEY) must be set manually in the
      # Render Dashboard → Environment tab. Do NOT define them here so that
      # dashboard values are never shadowed by this file.
    disk:
      name: legal-data
      mountPath: /app/data
      sizeGB: 10
